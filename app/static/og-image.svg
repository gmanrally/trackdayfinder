<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="TrackdayFinder">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#111a2e"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Chequered flag mark -->
  <g transform="translate(80,180)">
    <rect x="0" y="0" width="10" height="270" rx="3" fill="#ffffff"/>
    <g transform="translate(18,16)">
      <g transform="skewY(-3)">
        <rect width="200" height="200" fill="#ffffff"/>
        <g fill="#0b1220">
          <rect x="0"   y="0"   width="50" height="50"/>
          <rect x="100" y="0"   width="50" height="50"/>
          <rect x="50"  y="50"  width="50" height="50"/>
          <rect x="150" y="50"  width="50" height="50"/>
          <rect x="0"   y="100" width="50" height="50"/>
          <rect x="100" y="100" width="50" height="50"/>
          <rect x="50"  y="150" width="50" height="50"/>
          <rect x="150" y="150" width="50" height="50"/>
        </g>
      </g>
    </g>
  </g>

  <!-- Wordmark -->
  <text x="360" y="270"
        font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
        font-weight="800"
        font-size="100"
        letter-spacing="-3"
        fill="#ffffff">Trackday<tspan fill="#dc2626">Finder</tspan></text>
  <text x="360" y="330"
        font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
        font-weight="600"
        font-size="40"
        fill="#cbd5e1">.co.uk</text>

  <!-- Tagline -->
  <text x="360" y="430"
        font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
        font-weight="500"
        font-size="44"
        fill="#94a3b8">Europe's largest trackday database</text>
  <text x="360" y="490"
        font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
        font-weight="400"
        font-size="28"
        fill="#64748b">UK + European car and bike trackdays · free · no sign-up</text>

  <!-- Bottom red accent bar -->
  <rect x="0" y="610" width="1200" height="20" fill="#dc2626"/>
</svg>
