<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="TrackdayFinder">
  <title>TrackdayFinder (square icon)</title>
  <!-- Rounded square background -->
  <rect width="256" height="256" rx="40" fill="#0b1220"/>

  <!-- Centred chequered flag, larger -->
  <g transform="translate(56,40)">
    <!-- pole -->
    <rect x="0" y="0" width="8" height="180" rx="3" fill="#ffffff"/>
    <!-- flag (slight wave) -->
    <g transform="translate(12,8)">
      <g transform="skewY(-3)">
        <rect width="132" height="132" fill="#ffffff"/>
        <g fill="#0b1220">
          <!-- 4x4 checker, 33x33 cells -->
          <rect x="0"   y="0"   width="33" height="33"/>
          <rect x="66"  y="0"   width="33" height="33"/>
          <rect x="33"  y="33"  width="33" height="33"/>
          <rect x="99"  y="33"  width="33" height="33"/>
          <rect x="0"   y="66"  width="33" height="33"/>
          <rect x="66"  y="66"  width="33" height="33"/>
          <rect x="33"  y="99"  width="33" height="33"/>
          <rect x="99"  y="99"  width="33" height="33"/>
        </g>
      </g>
    </g>
  </g>

  <!-- Red accent bar at bottom -->
  <rect x="40" y="220" width="176" height="6" rx="3" fill="#dc2626"/>

  <!-- TF monogram below the flag is omitted to keep it clean -->
</svg>
