# /etc/nginx/sites-available/trackdayfinder
# Initial HTTP-only config. `certbot --nginx` edits this in-place after issuing
# the cert: it adds a 443 server block, the ssl_certificate lines, and a
# 80 -> 443 redirect. Don't reference cert files here — they don't exist yet.

server {
    listen 80;
    server_name YOUR-DOMAIN.COM www.YOUR-DOMAIN.COM;

    # Reasonable timeouts for the refresh endpoint (can take 30s+).
    proxy_read_timeout 120s;
    proxy_connect_timeout 10s;

    gzip on;
    gzip_types text/plain application/json;

    location / {
        proxy_pass http://127.0.0.1:8766;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
