# /etc/nginx/sites-available/trackdayfinder
# Replace YOUR-DOMAIN.COM with the domain you point at this VPS.

server {
    listen 80;
    server_name YOUR-DOMAIN.COM www.YOUR-DOMAIN.COM;

    # Let's Encrypt HTTP-01 challenge:
    location /.well-known/acme-challenge/ { root /var/www/html; }

    # Everything else -> HTTPS
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    server_name YOUR-DOMAIN.COM www.YOUR-DOMAIN.COM;

    ssl_certificate     /etc/letsencrypt/live/YOUR-DOMAIN.COM/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR-DOMAIN.COM/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Reasonable timeouts for the refresh endpoint (which can take 30s+)
    proxy_read_timeout 120s;
    proxy_connect_timeout 10s;

    # Tiny app: no need for a CDN. Gzip helps the JSON API.
    gzip on;
    gzip_types text/html text/plain application/json;

    location / {
        proxy_pass http://127.0.0.1:8766;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
