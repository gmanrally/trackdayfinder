# nginx vhost for analytics.trackdayfinder.co.uk
# Drop this in /etc/nginx/sites-available/analytics.trackdayfinder.co.uk
# then: ln -s ../sites-available/analytics.trackdayfinder.co.uk /etc/nginx/sites-enabled/
#       certbot --nginx -d analytics.trackdayfinder.co.uk
#       systemctl reload nginx
#
# DNS: add an A record analytics.trackdayfinder.co.uk -> 187.77.181.187 first.

server {
    listen 80;
    listen [::]:80;
    server_name analytics.trackdayfinder.co.uk;

    # certbot will rewrite this block to add the SSL listener + cert paths.
    location / {
        proxy_pass http://127.0.0.1:3210;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }
}
