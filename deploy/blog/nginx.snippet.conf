# Insert this `location /blog` block INSIDE the existing
# /etc/nginx/sites-available/trackdayfinder.co.uk server block (the
# HTTPS one — certbot's added the SSL listener and cert paths there).
#
# Test with `nginx -t` then `systemctl reload nginx`.

# The WP container serves PHP-FPM on 127.0.0.1:9100 and stores
# /var/www/html in the named volume blog-wp-data. nginx needs access
# to that same path so it can serve static files (uploads, themes, JS).
# We bind-mount the volume read-only at /var/www/blog on the host:
#   sudo mkdir -p /var/www/blog
#   sudo ln -s /var/lib/docker/volumes/trackdayfinder-blog_blog-wp-data/_data /var/www/blog
# (or just `docker cp` the relevant subtree; see README.md)

location /blog/ {
    alias /var/www/blog/;
    index index.php index.html;

    # Pretty permalinks — fall through to WordPress's router.
    try_files $uri $uri/ /blog/index.php?$args;

    location ~ \.php$ {
        include fastcgi_params;

        # The container expects SCRIPT_FILENAME relative to its own /var/www/html
        # root, so rewrite the path back from /blog/foo.php to /var/www/html/foo.php.
        fastcgi_split_path_info ^/blog(/.+\.php)(/.*)$;
        fastcgi_param SCRIPT_FILENAME /var/www/html$fastcgi_path_info;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param HTTP_X_FORWARDED_PROTO $scheme;
        fastcgi_param HTTPS on;

        fastcgi_pass 127.0.0.1:9100;
        fastcgi_index index.php;
    }

    # Long-cache static assets (themes, uploads, plugins).
    location ~* \.(jpg|jpeg|png|gif|webp|svg|ico|css|js|woff2?)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, immutable";
    }
}

# Redirect bare /blog (no slash) to /blog/ so WP sees a clean root.
location = /blog {
    return 301 /blog/;
}
